app.hikari.enabled=false
app.hikari.jdbc-url=jdbc:postgresql://127.0.0.1:5432/tickets
app.hikari.username=postgres
app.hikari.password=postgres
app.hikari.maximum-pool-size=16
app.hikari.minimum-idle=4
app.hikari.connection-timeout-ms=30000
app.hikari.idle-timeout-ms=600000
app.hikari.max-lifetime-ms=1800000
app.hikari.pool-name=tickets-hikari-pool

app.minio.enabled=true
app.minio.endpoint=http://127.0.0.1:9000
app.minio.access-key=minioadmin
app.minio.secret-key=minioadmin
app.minio.bucket=ticket-imports
app.minio.auto-create-bucket=true

app.cache.l2.stats.logging.enabled=false
